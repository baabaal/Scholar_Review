services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes: [mongo-data:/data/db]

  server:
    build: ./server
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/scholar_review
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      CLIENT_URL: http://localhost:8080
      NODE_ENV: production
    depends_on: [mongo]

  client:
    build:
      context: ./client
      args: { VITE_API_URL: /api }
    restart: unless-stopped
    ports: ["8080:80"]
    depends_on: [server]

volumes:
  mongo-data:
